<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agentic Compliance Lab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💊</text></svg>">
  <link rel="stylesheet" href="styles.css?v=6">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header" role="banner">
      <div class="header-content">
        <div class="logo-section">
          <div class="logo-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <path d="M20 4L34 10V26C34 30 28 35 20 38C12 35 6 30 6 26V10L20 4Z" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="2"/>
              <rect x="17" y="13" width="6" height="16" rx="1" fill="#0d9488"/>
              <rect x="12" y="18" width="16" height="6" rx="1" fill="#0d9488"/>
            </svg>
          </div>
          <div class="logo-text">
            <h1>Agentic Compliance Lab</h1>
            <p>Automated OTC Medicine Label Analysis</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-create" onclick="openCreateModal()" aria-label="New Analysis">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/>
            </svg>
            New Analysis
          </button>
          <a href="settings.html" class="btn-settings" aria-label="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" role="main">
      <!-- Stats Dashboard -->
      <div class="stats-dashboard">
        <div class="stat-card" data-stat="total">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="totalProjects">0</div>
            <div class="stat-label">Total Projects</div>
          </div>
        </div>

        <div class="stat-card" data-stat="complete">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="completedProjects">0</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>

        <div class="stat-card" data-stat="processing">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="processingProjects">0</div>
            <div class="stat-label">In Progress</div>
          </div>
        </div>


      </div>

      <!-- Analytics Section -->
      <div id="analyticsSection" class="analytics-section"></div>

      <!-- Projects Grid -->
      <div class="projects-section">
        <div class="section-header">
          <h2>Recent Projects</h2>
          <div class="search-filter">
            <div class="search-input">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
              </svg>
              <input type="text" placeholder="Search projects..." id="searchInput" aria-label="Search projects">
            </div>
          </div>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
      </div>
    </main>
  </div>

  <!-- Create Modal -->
  <div id="createModal" class="modal">
    <div class="modal-overlay" onclick="closeCreateModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create New Project</h3>
        <button class="modal-close" onclick="closeCreateModal()" aria-label="Close modal">
          <svg width="24" height="24" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
          </svg>
        </button>
      </div>
      <form onsubmit="createProject(event)">
        <div class="form-group">
          <label>Project Name</label>
          <input type="text" id="projectName" required placeholder="e.g., Aspirin Label Review Q1 2026" aria-label="Project name">
        </div>
        <div class="form-group">
          <label>Regulatory Region</label>
          <select id="projectRegion" required aria-label="Regulatory region">
            <option value="US_FDA">🇺🇸 United States - FDA (21 CFR Part 201)</option>
            <option value="UK_MHRA">🇬🇧 United Kingdom - MHRA (Human Medicines Regulations 2012)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description (Optional)</label>
          <textarea id="projectDescription" rows="3" placeholder="Brief description of this compliance analysis" aria-label="Project description"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeCreateModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js?v=6"></script>
  <script src="db.js?v=6"></script>
  <script src="app.js?v=6"></script>
</body>
</html>

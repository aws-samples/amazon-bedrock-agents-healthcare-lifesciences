AWSTemplateFormatVersion: '2010-09-09'
Description: 'Genomics VEP Pipeline Infrastructure - Creates S3 buckets, IAM roles, DynamoDB tables, and HealthOmics workflow'

Parameters:
  ProjectName:
    Type: String
    Default: 'genomics-vep-pipeline'
    Description: 'Name prefix for all resources'
  
  VcfInputBucketName:
    Type: String
    Default: 'genomics-vcf-input-bucket-v3'
    Description: 'S3 bucket for input VCF files'
    
  VepOutputBucketName:
    Type: String
    Default: 'genomics-vep-output-bucket-v3'
    Description: 'S3 bucket for VEP workflow outputs'
    
  BatchSize:
    Type: Number
    Default: 20
    Description: 'Number of VCF files to process in each batch'

  TableBucketArn:
    Type: String
    Default: ''
    Description: 'ARN of the S3 Tables bucket (e.g. arn:aws:s3tables:us-west-2:123456789012:bucket/my-bucket). If empty, s3tables permissions use wildcard.'

Conditions:
  HasTableBucketArn: !Not [!Equals [!Ref TableBucketArn, '']]

Resources:
  # S3 Access Logging Bucket
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AccessLogBucket.Arn}/*'
            Condition:
              ArnLike:
                aws:SourceArn:
                  - !GetAtt VcfInputBucket.Arn
                  - !GetAtt VepOutputBucket.Arn
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt AccessLogBucket.Arn
              - !Sub '${AccessLogBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # S3 Input Bucket (W28: no explicit name, W35: logging, W51: policy)
  VcfInputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: vcf-input-logs/

  VcfInputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VcfInputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt VcfInputBucket.Arn
              - !Sub '${VcfInputBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # S3 Output Bucket (W28: no explicit name, W35: logging, W51: policy)
  VepOutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: vep-output-logs/

  VepOutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VepOutputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt VepOutputBucket.Arn
              - !Sub '${VepOutputBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # DynamoDB Table (W74: KMS encryption, W28: no explicit TableName)
  DynamoTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      AttributeDefinitions:
        - AttributeName: SampleID
          AttributeType: S
        - AttributeName: ProcessingStage
          AttributeType: S
        - AttributeName: RunID
          AttributeType: S
      KeySchema:
        - AttributeName: SampleID
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ProcessingStageIndex
          KeySchema:
            - AttributeName: ProcessingStage
              KeyType: HASH
            - AttributeName: SampleID
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: RunIDIndex
          KeySchema:
            - AttributeName: RunID
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # IAM Role for Lambda Functions (W28: no explicit RoleName)
  GenomicsLambdaExecutionRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GenomicsOmicsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - omics:GetWorkflow
                  - omics:ListWorkflows
                  - omics:StartRun
                  - omics:GetRun
                  - omics:ListRuns
                Resource:
                  - !Sub 'arn:aws:omics:${AWS::Region}:${AWS::AccountId}:*'
        - PolicyName: GenomicsS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub '${VcfInputBucket.Arn}/*'
                  - !Sub '${VepOutputBucket.Arn}/*'
                  - !GetAtt VcfInputBucket.Arn
                  - !GetAtt VepOutputBucket.Arn
        - PolicyName: GenomicsS3TablesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3tables:GetTableBucket
                  - s3tables:GetTable
                  - s3tables:PutTableData
                  - s3tables:GetTableData
                  - s3tables:ListTables
                  - s3tables:ListNamespaces
                Resource: !If
                  - HasTableBucketArn
                  - - !Ref TableBucketArn
                    - !Sub '${TableBucketArn}/*'
                  - '*'
        - PolicyName: GenomicsDynamoDBPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt DynamoTable.Arn
                  - !Sub '${DynamoTable.Arn}/index/*'
        - PolicyName: GenomicsPassRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt HealthOmicsWorkflowRole.Arn

  # IAM Role for HealthOmics Workflows (W28: no explicit RoleName)
  HealthOmicsWorkflowRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: omics.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: HealthOmicsWorkflowPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub '${VcfInputBucket.Arn}/*'
                  - !Sub '${VepOutputBucket.Arn}/*'
                  - !GetAtt VcfInputBucket.Arn
                  - !GetAtt VepOutputBucket.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/omics/*'

Outputs:
  VcfInputBucketName:
    Description: 'Name of the VCF input S3 bucket'
    Value: !Ref VcfInputBucket
    Export:
      Name: !Sub '${AWS::StackName}-VcfInputBucket'

  VepOutputBucketName:
    Description: 'Name of the VEP output S3 bucket'
    Value: !Ref VepOutputBucket
    Export:
      Name: !Sub '${AWS::StackName}-VepOutputBucket'

  DynamoTableName:
    Description: 'Name of the DynamoDB tracking table'
    Value: !Ref DynamoTable
    Export:
      Name: !Sub '${AWS::StackName}-DynamoTable'

  LambdaExecutionRoleArn:
    Description: 'ARN of the Lambda execution role'
    Value: !GetAtt GenomicsLambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRole'

  HealthOmicsWorkflowRoleArn:
    Description: 'ARN of the HealthOmics workflow role'
    Value: !GetAtt HealthOmicsWorkflowRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-WorkflowRole'

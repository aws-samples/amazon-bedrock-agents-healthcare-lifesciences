AWSTemplateFormatVersion: '2010-09-09'
Description: ICH Guidelines MCP Server - Lambda function for Bedrock KB retrieval

Parameters:
  AppName:
    Type: String
    Default: ich-guidelines
    Description: Application name used for resource naming
  KnowledgeBaseId:
    Type: String
    Default: REPLACE_AFTER_KB_DEPLOY
    Description: Bedrock Knowledge Base ID (set after KB stack deploys)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockKBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*'

  IchGuidelinesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-handler'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          ICH_KB_ID: !Ref KnowledgeBaseId
      Code:
        ZipFile: |
          # Placeholder — deploy.sh packages index.py into this function
          def handler(event, context):
              return {"error": "Not deployed. Run deploy.sh to package code."}

Outputs:
  FunctionArn:
    Description: Lambda function ARN for AgentCore Gateway target
    Value: !GetAtt IchGuidelinesFunction.Arn
    Export:
      Name: !Sub '${AppName}-function-arn'
  FunctionName:
    Description: Lambda function name
    Value: !Ref IchGuidelinesFunction
